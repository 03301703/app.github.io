<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores El Trigal — Tablero de Ejecución Semanal</title>
<meta name="description" content="Tablero de ejecución semanal de producción para Flores El Trigal S.A.S.">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D2957">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="El Trigal">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- Vendor CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- App CSS -->
<link href="style.css" rel="stylesheet">
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="uploadScreen">
  <div class="upload-card">
    <div class="brand-mark"><img src="icons/icon-72.png" alt="Logo" style="width:38px;height:38px;object-fit:contain;border-radius:8px;"></div>
    <h1>Flores El Trigal</h1>
    <p class="upload-sub">Tablero de ejecución semanal · Reunión de Producción</p>
    <div class="dropzone" id="dropzone">
      <i class="bi bi-cloud-arrow-up"></i>
      <p>Arrastra el Excel aquí o haz clic para seleccionar</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div id="uploadStatusText">Leyendo archivo…</div>
    </div>
    <div class="upload-error" id="uploadError">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <div id="uploadErrorText"></div>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
  <aside id="sidebar">
    <div class="sidebar-head">
      <div class="mark"><img src="icons/icon-72.png" alt="Logo" style="width:24px;height:24px;object-fit:contain;border-radius:6px;"></div>
      <h5>Flores El Trigal</h5>
      <small id="sidebarSubtitle">Tablero de ejecución</small>
    </div>
    <ul id="navList"></ul>
    <div class="sidebar-foot">
      <button class="btn btn-gold" id="newFileBtn"><i class="bi bi-upload me-1"></i> Cargar otra semana</button>
    </div>
  </aside>
  <div id="mainCol">
    <div id="topbar">
      <button id="sidebarToggle" class="btn btn-sm-ghost" style="width:38px;height:38px;"><i class="bi bi-list"></i></button>
      <div class="file-chip"><i class="bi bi-file-earmark-spreadsheet"></i> <span id="fileNameChip">—</span></div>
      <div class="file-chip"><i class="bi bi-calendar-week"></i> <span id="weekChip">—</span></div>
      <div class="file-chip" id="fincaChip" style="display:none;"><i class="bi bi-geo-alt"></i> <span id="fincaChipText">—</span></div>
      <div style="flex:1"></div>
      <button class="btn btn-sm-ghost" id="topExportBtn"><i class="bi bi-file-earmark-excel me-1"></i> Exportar resumen</button>
    </div>
    <div id="pageArea"></div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner-gold"></div>
    <div style="font-weight:700;color:var(--navy);" id="loadingText">Analizando archivo…</div>
  </div>
</div>


<!-- Vendor JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- App JS -->
<script src="app.js"></script>
</body>
</html>
